<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM Surgeon Dashboard</title>
  <link rel="stylesheet" href="options.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="header__brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="4" stroke="#6366F1" stroke-width="2"/>
          <path d="M8 8L16 16M16 8L8 16" stroke="#6366F1" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="2.5" fill="#6366F1" opacity="0.3"/>
        </svg>
        <div>
          <h1>DOM Surgeon Dashboard</h1>
          <p>Manage all your site modifications globally</p>
        </div>
      </div>
      <div style="display: flex; gap: 8px; margin-left: auto; margin-right: 12px;">
        <input type="file" id="import-file" accept=".json" style="display: none;">
        <button id="btn-import" class="btn btn--secondary" style="background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          Import
        </button>
        <button id="btn-export" class="btn btn--secondary" style="background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          Export
        </button>
      </div>
      <button id="btn-clear-all" class="btn btn--danger">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18 M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6 M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        Wipe All Data
      </button>
    </header>

    <main class="main">
      <div class="stats">
        <div class="stat-card">
          <span class="stat-card__value" id="stat-sites">0</span>
          <span class="stat-card__label">Total Sites Modified</span>
        </div>
        <div class="stat-card">
          <span class="stat-card__value" id="stat-changes">0</span>
          <span class="stat-card__label">Total Elements Changed</span>
        </div>
      </div>

      <div class="table-container">
        <div id="sites-list" class="accordion">
          <!-- Rendered by JS -->
        </div>
        
        <div id="empty-state" class="empty-state" style="display: none;">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 8v4l3 3"></path>
          </svg>
          <p>No sites have been modified yet.</p>
        </div>
      </div>
    </main>
  </div>
  <script src="options.js"></script>
</body>
</html>
